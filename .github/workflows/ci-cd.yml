name: CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # ghcr.io/<owner>/<repo> — lowercased automatically by GitHub for the registry path
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  # TODO: set this to your Azure Web App name (the <APP> you create in Azure)
  AZURE_WEBAPP_NAME: serviceapp-api-CHANGEME

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json   # honors SDK 10.0.301 / rollForward latestFeature

      - run: dotnet restore ServiceApp.sln
      - run: dotnet build ServiceApp.sln -c Release --no-restore
      - run: dotnet test ServiceApp.sln -c Release --no-build --verbosity normal
        # Runs the ServiceApp.Tests xUnit project (AuthService, BookingService, PasswordHasher).

  docker-deploy:
    needs: build-test
    if: github.ref == 'refs/heads/main'   # build & deploy the image only on main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                     # allow pushing the image to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in token, no manual secret needed

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .                      # solution root (project references)
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}
